function getStatusClass(s){
  if(!s) return 's-default';
  const sl=s.toLowerCase();
  if(sl==='launched') return 's-launched';
  if(sl==='developing') return 's-developing';
  if(sl==='testnet') return 's-testnet';
  if(sl.includes('writing mrd')) return 's-mrd';
  if(sl.includes('mrd to be')) return 's-mrd';
  if(sl.includes('prd to be')) return 's-prd';
  if(sl.includes('trd to be')) return 's-trd';
  if(sl==='trd reviewed') return 's-trd-rev';
  if(sl.includes('confirming')) return 's-conf';
  if(sl==='tbc') return 's-tbc';
  if(sl.includes('contract')) return 's-contract';
  return 's-default';
}

function getPriorityClass(p){
  if(p==='P-1') return 'p-pm1';
  if(p==='P0') return 'p-p0';
  if(p==='P1') return 'p-p1';
  if(p==='P2') return 'p-p2';
  return 'p-pm1';
}

function daysLeft(d){
  if(!d) return null;
  return Math.ceil((d-TODAY)/86400000);
}

function fmtDate(d){
  if(!d) return '—';
  return d.toISOString().slice(0,10).replace(/-/g,'/');
}

function getRowClass(item){
  if(item.status==='Launched') return 'row-norm';
  const dl=daysLeft(item.deadline);
  if(dl!==null && dl<=7) return 'row-urgent';
  if(dl!==null && dl<=14) return 'row-warn';
  return 'row-norm';
}

function renderDays(item){
  if(item.status==='Launched') return '<span style="color:#4ade80;font-size:11px">✅ Done</span>';
  const d=daysLeft(item.deadline);
  if(d===null) return '<span class="text-gray-600">—</span>';
  if(d<0) return '<span style="color:#f87171;font-weight:700">Overdue '+Math.abs(d)+'d</span>';
  if(d<=7) return '<span style="color:#f87171;font-weight:700">⚠️ '+d+'d</span>';
  if(d<=14) return '<span style="color:#fbbf24;font-weight:600">'+d+'d</span>';
  return '<span class="text-gray-400">'+d+'d</span>';
}

function buildTabs(){
  const bar=document.getElementById('tabBar');
  bar.innerHTML=TEAMS.map(t=>'<button class="tab-btn'+(t.id===currentTeam?' active':'')+'" onclick="switchTab(\''+t.id+'\')">'+t.label+'</button>').join('');
}

function renderStats(data){
  const total=data.length;
  const launched=data.filter(d=>d.status==='Launched').length;
  const active=data.filter(d=>d.status&&d.status!=='Launched').length;
  const atRisk=data.filter(d=>{

    const dl=daysLeft(d.deadline);
    return dl!==null&&dl<=14;
  }).length;
  document.getElementById('statCards').innerHTML=
    '<div class="stat-card"><div class="text-2xl font-bold text-white">'+total+'</div><div class="text-xs text-gray-500 mt-1">Total Projects</div></div>'+
    '<div class="stat-card" style="border-color:#7f1d1d"><div class="text-2xl font-bold text-red-400">'+atRisk+'</div><div class="text-xs text-gray-500 mt-1">⚠️ At Risk (≤14d)</div></div>'+
    '<div class="stat-card" style="border-color:#1e3a5f"><div class="text-2xl font-bold text-blue-400">'+active+'</div><div class="text-xs text-gray-500 mt-1">🔄 In Progress</div></div>'+
    '<div class="stat-card" style="border-color:#14532d"><div class="text-2xl font-bold text-green-400">'+launched+'</div><div class="text-xs text-gray-500 mt-1">✅ Launched</div></div>';
}

function renderAlerts(data){
  const urgent=data.filter(d=>{
    if(d.status==='Launched') return false;
    const dl=daysLeft(d.deadline);
    return d.priority==='P0'&&dl!==null&&dl<=7;
  });
  const banner=document.getElementById('alertBanner');
  if(!urgent.length){banner.innerHTML='';return;}
  banner.innerHTML='<div style="background:#450a0a;border:1px solid #7f1d1d;border-radius:8px;padding:10px 16px;color:#fca5a5;font-size:13px">🚨 <strong>P0 Urgent:</strong> '+urgent.map(u=>u.name.trim()+' ('+daysLeft(u.deadline)+'d left)').join(' · ')+'</div>';
}

function populateFilters(data){
  const statuses=[...new Set(data.map(d=>d.status).filter(Boolean))].sort();
  const pics=[...new Set(data.map(d=>d.pic).filter(Boolean))].sort();
  const sf=document.getElementById('statusFilter');
  const pf=document.getElementById('picFilter');
  const cs=sf.value,cp=pf.value;
  sf.innerHTML='<option value="">All Status</option>'+statuses.map(s=>'<option value="'+s+'"'+(s===cs?' selected':'')+'>'+s+'</option>').join('');
  pf.innerHTML='<option value="">All PIC</option>'+pics.map(p=>'<option value="'+p+'"'+(p===cp?' selected':'')+'>'+p+'</option>').join('');
}

function applyFilters(){
  const search=document.getElementById('searchInput').value.toLowerCase();
  const status=document.getElementById('statusFilter').value;
  const priority=document.getElementById('priorityFilter').value;
  const pic=document.getElementById('picFilter').value;
  const teamData=rawData.filter(d=>d.team===currentTeam);
  const filtered=teamData.filter(d=>{
    if(search&&!d.name.toLowerCase().includes(search)&&!d.pic.toLowerCase().includes(search)) return false;
    if(status&&d.status!==status) return false;
    if(priority&&d.priority!==priority) return false;
    if(pic&&d.pic!==pic) return false;
    return true;
  });
  renderTable(filtered);
}

function renderTable(data){
  const tbody=document.getElementById('tableBody');
  const empty=document.getElementById('emptyState');
  const sorted=[...data].sort((a,b)=>{
    if(a.status==='Launched'&&b.status!=='Launched') return 1;
    if(b.status==='Launched'&&a.status!=='Launched') return -1;
    const da=a.deadline?a.deadline.getTime():Infinity;
    const db=b.deadline?b.deadline.getTime():Infinity;
    return da-db;
  });
  document.getElementById('rowCount').textContent=sorted.length+' projects';
  if(!sorted.length){tbody.innerHTML='';empty.classList.remove('hidden');return;}
  empty.classList.add('hidden');
  tbody.innerHTML=sorted.map((item,i)=>{
    const hasNotes=item.notes&&item.notes.trim();
    const mrdBtn=item.mrd?'<a class="mrd-link" href="'+item.mrd+'" target="_blank" onclick="event.stopPropagation()">📄 MRD</a>':'<span class="text-gray-700">—</span>';
    return '<tr class="xrow '+getRowClass(item)+'" onclick="toggleNotes(\'n'+i+'\')">'+
      '<td class="text-white font-medium">'+item.name+(hasNotes?' <span style="color:#374151;font-size:10px">▼</span>':'')+'</td>'+
      '<td class="text-gray-300" style="font-size:12px">'+item.pic+'</td>'+
      '<td><span class="badge '+getStatusClass(item.status)+'">'+( item.status||'—')+'</span></td>'+
      '<td>'+(item.priority?'<span class="badge '+getPriorityClass(item.priority)+'">'+item.priority+'</span>':'<span class="text-gray-600">—</span>')+'</td>'+
      '<td class="text-gray-400" style="font-size:11px">'+(item.okr.length?item.okr.join(', '):'—')+'</td>'+
      '<td class="text-gray-400" style="font-size:12px">'+fmtDate(item.deadline)+'</td>'+
      '<td>'+renderDays(item)+'</td>'+
      '<td>'+mrdBtn+'</td>'+
      '</tr>'+
      (hasNotes?'<tr id="n'+i+'" class="notes-row"><td colspan="8" style="background:#0d0f1a;color:#9ca3af;font-size:12px;padding:8px 16px;font-style:italic;border-left:3px solid #374151">'+item.notes+'</td></tr>':'');
  }).join('');
}

function toggleNotes(id){
  const el=document.getElementById(id);
  if(el) el.classList.toggle('open');
}

function switchTab(team){
  currentTeam=team;
  buildTabs();
  document.getElementById('searchInput').value='';
  document.getElementById('priorityFilter').value='';
  const teamData=rawData.filter(d=>d.team===team);
  populateFilters(teamData);
  renderStats(teamData);
  renderAlerts(teamData);
  applyFilters();
}

function resetFilters(){
  document.getElementById('searchInput').value='';
  document.getElementById('statusFilter').value='';
  document.getElementById('priorityFilter').value='';
  document.getElementById('picFilter').value='';
  applyFilters();
}

buildTabs();
switchTab('campaign');
</script>
</body>
</html>
