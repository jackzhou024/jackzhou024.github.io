<script src="https://cdn.tailwindcss.com"></script>
<style>
:root{--bybit-yellow:#F7A600;--bybit-yellow-dim:#c98900;--bg-base:#0e0e10;--bg-card:#16161a;--bg-card2:#1c1c22;--border:#2a2a35;--text-primary:#f0f0f0;--text-secondary:#8a8a9a;--text-muted:#4a4a5a}
*{box-sizing:border-box}
body{background:var(--bg-base);color:var(--text-primary);font-family:'Inter',system-ui,sans-serif;margin:0}
/* Navbar */
.navbar{background:#0e0e10;border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.navbar-logo{display:flex;align-items:center;gap:10px}
.logo-mark{background:var(--bybit-yellow);color:#000;font-weight:800;font-size:15px;padding:4px 10px;border-radius:4px;letter-spacing:.5px}
.logo-title{color:var(--text-primary);font-weight:600;font-size:14px;opacity:.8}
.navbar-meta{font-size:12px;color:var(--text-muted)}
/* Layout */
.page{max-width:1400px;margin:0 auto;padding:24px 20px}
/* Cards */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:16px 20px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--bybit-yellow)}
.stat-card .num{font-size:28px;font-weight:800;color:#fff;line-height:1}
.stat-card .lbl{font-size:11px;color:var(--text-secondary);margin-top:4px;font-weight:500}
.stat-card.red::before{background:#f87171}
.stat-card.green::before{background:#4ade80}
.stat-card.blue::before{background:#60a5fa}
/* Tabs */
.tab-bar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:6px}
.tab-btn{padding:7px 18px;border-radius:7px;font-weight:600;font-size:13px;cursor:pointer;transition:all .15s;border:none;white-space:nowrap;color:var(--text-secondary);background:transparent}
.tab-btn.active{background:var(--bybit-yellow);color:#000}
.tab-btn:not(.active):hover{background:var(--bg-card2);color:var(--text-primary)}
/* Filters */
.filter-bar{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px}
select,input[type=text]{background:var(--bg-card2);border:1px solid var(--border);color:var(--text-primary);border-radius:7px;padding:7px 12px;font-size:13px;font-family:'Inter',sans-serif}
select:focus,input[type=text]:focus{outline:none;border-color:var(--bybit-yellow)}
.reset-btn{font-size:12px;color:var(--text-muted);padding:7px 14px;border:1px solid var(--border);border-radius:7px;background:transparent;cursor:pointer;font-family:'Inter',sans-serif}
.reset-btn:hover{border-color:var(--bybit-yellow);color:var(--bybit-yellow)}
/* Table */
.table-wrap{}
table{width:100%;min-width:860px;border-collapse:separate;border-spacing:0}
th{background:#111115;color:var(--text-muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:11px 14px;position:sticky;top:0;z-index:50;border-bottom:1px solid var(--border)}
td{padding:10px 14px;font-size:13px;border-bottom:1px solid #1a1a22;vertical-align:middle}

tr.xrow:hover td{background:#1a1a22;cursor:pointer}
.row-urgent{border-left:3px solid #f87171}
.row-warn{border-left:3px solid var(--bybit-yellow)}
.row-norm{border-left:3px solid transparent}
/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:4px;font-size:11px;font-weight:600;white-space:nowrap;letter-spacing:.02em}
.s-launched{background:#0d2e1a;color:#4ade80;border:1px solid #166534}
.s-developing{background:#0f1f36;color:#60a5fa;border:1px solid #1d4ed8}
.s-testnet{background:#0d2e1a;color:#34d399;border:1px solid #065f46}
.s-mrd{background:#271300;color:#fb923c;border:1px solid #9a3412}
.s-prd{background:#1f1000;color:#f97316;border:1px solid #7c2d12}
.s-trd{background:#160d35;color:#a78bfa;border:1px solid #4c1d95}
.s-trd-rev{background:#0f0d25;color:#818cf8;border:1px solid #3730a3}
.s-conf{background:#221200;color:#fbbf24;border:1px solid #854d0e}
.s-tbc{background:#111118;color:#6b7280;border:1px solid #374151}
.s-contract{background:#0f0e0d;color:#a8a29e;border:1px solid #44403c}
.s-default{background:#111118;color:#6b7280;border:1px solid #1f2937}
/* Priority badges - Bybit style */
.p-pm1{background:#2a0808;color:#f87171;border:1px solid #7f1d1d}
.p-p0{background:#2a1800;color:#F7A600;border:1px solid #854d0e}
.p-p1{background:#0a1628;color:#60a5fa;border:1px solid #1e3a5f}
.p-p2{background:#130d30;color:#a78bfa;border:1px solid #2d1b69}
/* Notes row */
.notes-row{display:none}
.notes-row.open{display:table-row}
.notes-cell{background:#0c0c10;color:#6b7280;font-size:12px;padding:8px 18px;font-style:italic;border-left:3px solid var(--border)}
/* Links */
a.mrd-link{color:var(--bybit-yellow);text-decoration:none;font-size:11px;font-weight:600}
a.mrd-link:hover{text-decoration:underline}
/* Alert */
.alert-p0{background:#1a0a00;border:1px solid #7c2d12;border-radius:8px;padding:10px 16px;color:#fca5a5;font-size:13px;margin-bottom:14px}
.row-count{font-size:12px;color:var(--text-muted)}
</style>
</head>

  {team:'campaign',name:'Trading Competition Template',pic:'grace.liu',status:'',priority:'P0',okr:["Revenue"],deadline:null,notes:'',mrd:''}
];

const TEAMS = [
  {id:'campaign',label:'🏁 Campaign'},
  {id:'opsedge',label:'⚙️ Ops Edge'},
  {id:'uj',label:'🎯 UJ'},
  {id:'learn',label:'📚 Learn'},
  {id:'seo',label:'🔍 SEO'},
  {id:'paid_media',label:'💰 Paid Media'},
  {id:'web2',label:'🌐 Web 2'},
];

let currentTeam = 'campaign';

function getStatusClass(s){
  if(!s) return 's-default';
  const sl=s.toLowerCase();
  if(sl==='launched') return 's-launched';
  if(sl==='developing') return 's-developing';
  if(sl==='testnet') return 's-testnet';
  if(sl.includes('writing mrd')) return 's-mrd';
  if(sl.includes('mrd to be')) return 's-mrd';
  if(sl.includes('prd to be')) return 's-prd';
  if(sl.includes('trd to be')) return 's-trd';
  if(sl==='trd reviewed') return 's-trd-rev';
  if(sl.includes('confirming')) return 's-conf';
  if(sl==='tbc') return 's-tbc';
  if(sl.includes('contract')) return 's-contract';
  return 's-default';
}

function getPriorityClass(p){
  if(p==='P-1') return 'p-pm1';
  if(p==='P0') return 'p-p0';
  if(p==='P1') return 'p-p1';
  if(p==='P2') return 'p-p2';
  return 'p-pm1';
}

function daysLeft(d){
  if(!d) return null;
  return Math.ceil((d-TODAY)/86400000);
}

function fmtDate(d){
  if(!d) return '—';
  return d.toISOString().slice(0,10).replace(/-/g,'/');
}

function getRowClass(item){
  if(item.status==='Launched') return 'row-norm';
  const dl=daysLeft(item.deadline);
  if(dl!==null && dl<=7) return 'row-urgent';
  if(dl!==null && dl<=14) return 'row-warn';
  return 'row-norm';
}

function renderDays(item){
  if(item.status==='Launched') return '<span style="color:#4ade80;font-size:11px">✅ Done</span>';
  const d=daysLeft(item.deadline);
  if(d===null) return '<span class="text-gray-600">—</span>';
  if(d<0) return '<span style="color:#f87171;font-weight:700">Overdue '+Math.abs(d)+'d</span>';
  if(d<=7) return '<span style="color:#f87171;font-weight:700">⚠️ '+d+'d</span>';
  if(d<=14) return '<span style="color:#fbbf24;font-weight:600">'+d+'d</span>';
  return '<span class="text-gray-400">'+d+'d</span>';
}

function buildTabs(){
  const bar=document.getElementById('tabBar');
  bar.innerHTML=TEAMS.map(t=>'<button class="tab-btn'+(t.id===currentTeam?' active':'')+'" onclick="switchTab(\''+t.id+'\')">'+t.label+'</button>').join('');
}

function renderStats(data){
  const total=data.length;
  const launched=data.filter(d=>d.status==='Launched').length;
  const active=data.filter(d=>d.status&&d.status!=='Launched').length;
  const atRisk=data.filter(d=>{
    if(d.status==='Launched') return false;
    const dl=daysLeft(d.deadline);
    return dl!==null&&dl<=14;
  }).length;
  document.getElementById('statCards').innerHTML=
    '<div class="stat-card"><div class="num">'+total+'</div><div class="lbl">Total Projects</div></div>'+
    '<div class="stat-card red"><div class="num" style="color:#f87171">'+atRisk+'</div><div class="lbl">⚠️ At Risk (≤14d)</div></div>'+
    '<div class="stat-card blue"><div class="num" style="color:#60a5fa">'+active+'</div><div class="lbl">🔄 In Progress</div></div>'+
    '<div class="stat-card green"><div class="num" style="color:#4ade80">'+launched+'</div><div class="lbl">✅ Launched</div></div>';
}

function renderAlerts(data){
  const urgent=data.filter(d=>{
    if(d.status==='Launched') return false;
    const dl=daysLeft(d.deadline);
    return d.priority==='P0'&&dl!==null&&dl<=7;
  });
  const banner=document.getElementById('alertBanner');
  if(!urgent.length){banner.innerHTML='';return;}
  banner.innerHTML='<div class="alert-p0">🚨 <strong>P0 Urgent:</strong> '+urgent.map(u=>u.name.trim()+' ('+daysLeft(u.deadline)+'d left)').join(' · ')+'</div>';
}

function populateFilters(data){
  const statuses=[...new Set(data.map(d=>d.status).filter(Boolean))].sort();
  const pics=[...new Set(data.map(d=>d.pic).filter(Boolean))].sort();
  const sf=document.getElementById('statusFilter');
  const pf=document.getElementById('picFilter');
  const cs=sf.value,cp=pf.value;
  sf.innerHTML='<option value="">All Status</option>'+statuses.map(s=>'<option value="'+s+'"'+(s===cs?' selected':'')+'>'+s+'</option>').join('');
  pf.innerHTML='<option value="">All PIC</option>'+pics.map(p=>'<option value="'+p+'"'+(p===cp?' selected':'')+'>'+p+'</option>').join('');
}

function applyFilters(){
  const search=document.getElementById('searchInput').value.toLowerCase();
  const status=document.getElementById('statusFilter').value;
  const priority=document.getElementById('priorityFilter').value;
  const pic=document.getElementById('picFilter').value;
  const teamData=rawData.filter(d=>d.team===currentTeam);
  const filtered=teamData.filter(d=>{
    if(search&&!d.name.toLowerCase().includes(search)&&!d.pic.toLowerCase().includes(search)) return false;
    if(status&&d.status!==status) return false;
    if(priority&&d.priority!==priority) return false;
    if(pic&&d.pic!==pic) return false;
    return true;
  });
  renderTable(filtered);
}

function renderTable(data){
  const tbody=document.getElementById('tableBody');
  
  const sorted=[...data].sort((a,b)=>{
    if(a.status==='Launched'&&b.status!=='Launched') return 1;
    if(b.status==='Launched'&&a.status!=='Launched') return -1;
    const da=a.deadline?a.deadline.getTime():Infinity;
    const db=b.deadline?b.deadline.getTime():Infinity;
    return da-db;
  });
  document.getElementById('rowCount').textContent=sorted.length+' projects';
  if(!sorted.length){tbody.innerHTML='';document.getElementById('emptyState').style.display='block';return;}
  document.getElementById('emptyState').style.display=sorted.length?'none':'block';
  tbody.innerHTML=sorted.map((item,i)=>{
    const hasNotes=item.notes&&item.notes.trim();
    const mrdBtn=item.mrd?'<a class="mrd-link" href="'+item.mrd+'" target="_blank" onclick="event.stopPropagation()">📄 MRD</a>':'<span style="color:#2a2a35">—</span>';
    return '<tr class="xrow '+getRowClass(item)+'" onclick="toggleNotes(\'n'+i+'\')">'+
      '<td style="color:#f0f0f0;font-weight:500">'+item.name+(hasNotes?' <span style="color:#2a2a35;font-size:10px">▼</span>':'')+'</td>'+
      '<td style="color:#8a8a9a;font-size:12px">'+item.pic+'</td>'+
      '<td><span class="badge '+getStatusClass(item.status)+'">'+(item.status||'—')+'</span></td>'+
      '<td>'+(item.priority?'<span class="badge '+getPriorityClass(item.priority)+'">'+item.priority+'</span>':'<span style="color:#2a2a35">—</span>')+'</td>'+
      '<td style="color:#6b7280;font-size:11px">'+(item.okr.length?item.okr.join(', '):'—')+'</td>'+
      '<td style="color:#8a8a9a;font-size:12px">'+fmtDate(item.deadline)+'</td>'+
      '<td>'+renderDays(item)+'</td>'+
      '<td>'+mrdBtn+'</td>'+
      '</tr>'+
      (hasNotes?'<tr id="n'+i+'" class="notes-row"><td colspan="8" class="notes-cell">'+item.notes+'</td></tr>':'');
  }).join('');
}

function toggleNotes(id){
  const el=document.getElementById(id);
  if(el) el.classList.toggle('open');
}

function switchTab(team){
  currentTeam=team;
  buildTabs();
  document.getElementById('searchInput').value='';
  document.getElementById('priorityFilter').value='';
  const teamData=rawData.filter(d=>d.team===team);
  populateFilters(teamData);
  renderStats(teamData);
  renderAlerts(teamData);
  applyFilters();
}

function resetFilters(){
  document.getElementById('searchInput').value='';
  document.getElementById('statusFilter').value='';
  document.getElementById('priorityFilter').value='';
  document.getElementById('picFilter').value='';
  applyFilters();
}

buildTabs();
switchTab('campaign');
</script>
</body>
</html>
